name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: express-typescript-master/package-lock.json

      - name: Install backend dependencies
        working-directory: ./express-typescript-master
        run: npm ci

      - name: Run backend tests
        working-directory: ./express-typescript-master
        run: npm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test
          JWT_SECRET: test_secret
          REDIS_URL: redis://localhost:6379

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/codereview-ai

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            cd express-typescript-master
            npm install
            cd ..

            echo "Installing frontend dependencies..."
            cd client
            npm install
            cd ..

            echo "Rebuilding containers..."
            docker compose up -d --build

            echo "Running migrations..."
            cd express-typescript-master
            # Note: Using manual SQL or drizzle-kit push depending on environment
            docker compose exec -T backend npm run db:migrate || echo "Migration failed, check logs"
            cd ..

            echo "Cleaning up old Docker images..."
            docker image prune -f

            echo "Deployment complete!"
            docker compose ps
