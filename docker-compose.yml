version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: codereview-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: codereview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: codereview-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./express-typescript-master
      dockerfile: Dockerfile
    container_name: codereview-backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./express-typescript-master/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/codereview
      REDIS_URL: redis://redis:6379
      HOST: 0.0.0.0
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: codereview-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
